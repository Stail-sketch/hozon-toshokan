<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; }
  .content p { margin-bottom: 20px; }
  .pgnum { position: fixed; bottom: 20px; right: 30px; color: rgba(255,255,255,0.08); font-size: 13px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="pgnum">253/300</div>
<div class="wrap">
  <div class="content">

    <p>館長は少しずつ、私に地下の存在を教えてくれました。</p>
    <p>地下一階。地下二階。<br>
    そしてある日、地下三階の鍵を渡されました。</p>
    <p>「いずれ必要になる」と館長は言いました。<br>
    何が必要になるのかは、教えてくれませんでした。</p>
    <p>「あなたが鍵になる」</p>
    <p>その言葉を、私は信頼の証だと思っていました。</p>

  </div>
</div>
<script>
console.log("253/300");
(function(){
  var ps=document.querySelectorAll('.content p');
  ps.forEach(function(p){p.style.opacity='0';p.style.transition='opacity 2s ease';});
  ps.forEach(function(p,i){
    setTimeout(function(){p.style.opacity='1';},4600*i);
  });
  var allDone=4600*(ps.length-1)+2000;
  setTimeout(function(){
    document.body.style.transition='opacity 0.5s ease';
    document.body.style.opacity='0';
    setTimeout(function(){window.location.href='../254/index.html';},500);
  },allDone+6000);
})();
</script>
</body>
</html>
