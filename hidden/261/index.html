<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; }
  .content p { margin-bottom: 20px; }
  .s { font-family: 'Courier New', Courier, monospace; color: #333333; font-size: 11px; line-height: 2.0; margin-bottom: 6px; }
  .s.w { color: #555522; }
  .s.e { color: #552222; }
  .s.c { color: #773333; }
  .s.f { color: #993333; }
  .frag { color: rgba(255,255,255,0.5); }
  .dim { color: rgba(255,255,255,0.25); }
  .vdim { color: rgba(255,255,255,0.1); }
  .indent { padding-left: 4em; }
  .pgnum { position: fixed; bottom: 20px; right: 30px; color: rgba(255,255,255,0.06); font-size: 13px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="pgnum">261/300</div>
<div class="wrap">
  <div class="content">

    <p>私がこの記録を残しているのは——</p>
    <p class="s">[SYSTEM] FILE_INTEGRITY_CHECK : RUNNING</p>
    <p>——あの方たちが存在したことを、どこかに残すためです。</p>
    <p class="s">[SYSTEM] ARCHIVE_STATUS : NOMINAL</p>
    <p>記録は脆いものです。<br>
    消そうと思えば消せてしまう。<br>
    だから、誰かが守らなければならなかった。</p>
    <p class="s">[SYSTEM] FILE_INTEGRITY_CHECK : COMPLETE / RESULT : 95%</p>

  </div>
</div>
<script>
console.log("261/300");
(function(){
  var items = document.querySelectorAll('.content p');
  items.forEach(function(el){ el.style.opacity='0'; });
  var cursor = document.createElement('span');
  cursor.textContent='_'; cursor.style.cssText='animation:blink .5s step-end infinite;font-family:Courier New,monospace';
  var style=document.createElement('style');
  style.textContent='@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}';
  document.head.appendChild(style);

  function shake(){
    var wrap=document.querySelector('.wrap');
    wrap.style.transform='translate('+(Math.random()*2-1)+'px,'+(Math.random()*2-1)+'px)';
    setTimeout(function(){wrap.style.transform='';},100);
  }
  function flashBg(){
    document.body.style.backgroundColor='rgba(139,0,0,0.15)';
    setTimeout(function(){document.body.style.backgroundColor='#000000';},100);
  }
  function typewrite(el,cb){
    var text=el.textContent; el.textContent=''; el.style.opacity='1';
    el.appendChild(cursor);
    var i=0;
    var iv=setInterval(function(){
      if(i<text.length){cursor.before(text[i]);i++;}
      else{clearInterval(iv);if(cursor.parentNode)cursor.remove();cb();}
    },30);
    shake();
  }
  function fadeIn(el,cb){
    el.style.transition='opacity 3s ease'; el.style.opacity='1';
    setTimeout(cb,3200);
  }
  function processItems(idx){
    if(idx>=items.length){setTimeout(function(){document.body.style.transition='opacity 0.5s ease';document.body.style.opacity='0';setTimeout(function(){window.location.href='../262/index.html';},500);},1000);return;}
    var el=items[idx];
    if(el.classList.contains('s')){
      typewrite(el,function(){
        if(el.textContent.indexOf('95%')!==-1) flashBg();
        setTimeout(function(){processItems(idx+1);},800);
      });
    } else {
      fadeIn(el,function(){processItems(idx+1);});
    }
  }
  setTimeout(function(){processItems(0);},500);
})();
</script>
</body>
</html>
