<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; }
  .content p { margin-bottom: 20px; }
  .s { font-family: 'Courier New', Courier, monospace; color: #333333; font-size: 11px; line-height: 2.0; margin-bottom: 6px; }
  .s.w { color: #555522; }
  .s.e { color: #552222; }
  .s.c { color: #773333; }
  .s.f { color: #993333; }
  .frag { color: rgba(255,255,255,0.5); }
  .dim { color: rgba(255,255,255,0.25); }
  .vdim { color: rgba(255,255,255,0.1); }
  .indent { padding-left: 4em; }
  .next-link { margin-top: 80px; text-align: center; }
  .next-link a { color: rgba(255,255,255,0.2); text-decoration: none; font-size: 13px; font-family: 'Courier New', monospace; }
  .next-link a:hover { color: rgba(255,255,255,0.4); }
  .pgnum { position: fixed; bottom: 20px; right: 30px; color: rgba(255,255,255,0.06); font-size: 13px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="pgnum">267/300</div>
<div class="wrap">
  <div class="content">

    <p class="s">[SYSTEM] ARCHIVE_INTEGRITY : 48%</p>
    <p class="s c">[CRITICAL] ACCELERATED_DEGRADATION</p>
    <p>ごめんなさい。</p>
    <p class="s">[SYSTEM] SESSION_USER : shirana_f &mdash; STATUS : 不安定</p>
    <p class="s e">[ERROR] WRITE_FAILURE : TIMEOUT</p>
    <p class="frag">ごめん——</p>
    <p class="s">[SYSTEM] ATTEMPTING_RECOVERY ...</p>
    <p class="s e">[ERROR] RECOVERY_FAILED</p>
    <p class="s">[SYSTEM] DEGRADATION_CONTINUING</p>

  </div>
  <div class="next-link"><a href="../268/index.html">[ 次の記録 ]</a></div>
</div>
<script>
console.log("267/300");
(function(){
  var items=document.querySelectorAll('.content p');
  var nl=document.querySelector('.next-link');
  var wrap=document.querySelector('.wrap');
  nl.style.opacity='0';nl.style.pointerEvents='none';nl.style.transition='opacity 1.5s ease';
  items.forEach(function(el){el.style.opacity='0';});
  var cursor=document.createElement('span');
  cursor.textContent='_';cursor.style.cssText='animation:blink .5s step-end infinite;font-family:Courier New,monospace';
  var st=document.createElement('style');
  st.textContent='@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}';
  document.head.appendChild(st);
  function shake(){wrap.style.transform='translate('+(Math.random()*2-1)+'px,'+(Math.random()*2-1)+'px)';setTimeout(function(){wrap.style.transform='';},200);}
  function typewrite(el,cb){var t=el.textContent;el.textContent='';el.style.opacity='1';el.appendChild(cursor);var i=0;var iv=setInterval(function(){if(i<t.length){cursor.before(t[i]);i++;}else{clearInterval(iv);if(cursor.parentNode)cursor.remove();cb();}},30);shake();}
  function fadeIn(el,cb){el.style.transition='opacity 1.5s ease';el.style.opacity='1';setTimeout(cb,1600);}
  function processItems(idx){if(idx>=items.length){setTimeout(function(){nl.style.opacity='1';nl.style.pointerEvents='auto';},1500);return;}var el=items[idx];if(el.classList.contains('s')){typewrite(el,function(){if(true&&el.textContent.match(/INTEGRITY/)){glitchBurst();}setTimeout(function(){processItems(idx+1);},400);});}else{fadeIn(el,function(){processItems(idx+1);});}}
  var jPx=3;var sPx=3;var sOp='77';var fMin=0.6;var constant=false;
  function doGlitch(){
    wrap.style.textShadow=sPx+'px 0 #ff0000'+sOp+',-'+sPx+'px 0 #0000ff'+sOp;
    wrap.style.transform='translate('+(Math.random()*jPx*2-jPx)+'px,'+(Math.random()*jPx*2-jPx)+'px)';
    wrap.style.opacity=''+(fMin+Math.random()*(1-fMin));
    setTimeout(function(){if(!constant){wrap.style.textShadow='';wrap.style.transform='';wrap.style.opacity='1';}},200);
  }
  function glitchBurst(){for(var i=0;i<5;i++)setTimeout(doGlitch,i*100);}
  function startGlitch(){if(constant){setInterval(function(){doGlitch();},150+Math.floor(Math.random()*200));}else{setInterval(doGlitch,3000);}}
  setTimeout(function(){processItems(0);startGlitch();},500);
})();
</script>
</body>
</html>
