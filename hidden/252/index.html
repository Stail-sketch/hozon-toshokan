<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; }
  .content p { margin-bottom: 20px; }
  .next-link { margin-top: 80px; text-align: center; }
  .next-link a { color: rgba(255,255,255,0.25); text-decoration: none; font-size: 13px; font-family: 'Courier New', monospace; }
  .next-link a:hover { color: rgba(255,255,255,0.5); }
  .pgnum { position: fixed; bottom: 20px; right: 30px; color: rgba(255,255,255,0.08); font-size: 13px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="pgnum">252/300</div>
<div class="wrap">
  <div class="content">

    <p>私が澄奈市立保存図書館に着任したのは、平成11年のことです。</p>
    <p>奈瀬 統一郎という方が館長をされていました。<br>
    穏やかで、静かな方でした。</p>
    <p>「図書館は記録の墓場ではない。記憶の器だ」</p>
    <p>それが、館長が私に最初にかけた言葉でした。<br>
    私はその言葉を信じました。<br>
    今でも信じています。</p>

  </div>
  <div class="next-link"><a href="../253/index.html">[ 次の記録 ]</a></div>
</div>
<script>
console.log("252/300");
(function(){
  var ps=document.querySelectorAll('.content p');
  var nl=document.querySelector('.next-link');
  nl.style.opacity='0';nl.style.pointerEvents='none';nl.style.transition='opacity 2s ease';
  ps.forEach(function(p){p.style.opacity='0';p.style.transition='opacity 2s ease';});
  ps.forEach(function(p,i){
    setTimeout(function(){p.style.opacity='1';},2500*i);
  });
  setTimeout(function(){nl.style.opacity='1';nl.style.pointerEvents='auto';},2500*ps.length+3000);
})();
</script>
</body>
</html>
