<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; }
  .content p { margin-bottom: 20px; }
  .s { font-family: 'Courier New', Courier, monospace; color: #333333; font-size: 11px; line-height: 2.0; margin-bottom: 6px; }
  .s.w { color: #555522; }
  .s.e { color: #552222; }
  .s.c { color: #773333; }
  .s.f { color: #993333; }
  .frag { color: rgba(255,255,255,0.5); }
  .dim { color: rgba(255,255,255,0.25); }
  .vdim { color: rgba(255,255,255,0.1); }
  .indent { padding-left: 4em; }
  .pgnum { position: fixed; bottom: 20px; right: 30px; color: rgba(255,255,255,0.06); font-size: 13px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="pgnum">271/300</div>
<div class="wrap">
  <div class="content">

    <p class="s">[SYSTEM] ARCHIVE_INTEGRITY : 15%</p>
    <p class="s f">[FATAL] CORE_DUMP_INITIATED</p>
    <p class="s">[0x0041] [0x0052] [0x0043] [0x0048] [0x0049] [0x0056] [0x0045]</p>
    <p class="s">...</p>
    <p class="s">[SYSTEM] DUMP_COMPLETE</p>
    <p class="s f">[FATAL] RECOVERY_IMPOSSIBLE</p>

  </div>
</div>
<script>
console.log("271/300");
(function(){
  var items=document.querySelectorAll('.content p');
  var wrap=document.querySelector('.wrap');
  items.forEach(function(el){el.style.opacity='0';});
  var cursor=document.createElement('span');
  cursor.textContent='_';cursor.style.cssText='animation:blink .5s step-end infinite;font-family:Courier New,monospace';
  var st=document.createElement('style');
  st.textContent='@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}';
  document.head.appendChild(st);
  var sPx=3;var jPx=4;var fMin=0.4;var gapMin=300;var gapMax=800;
  var gRunning=true;
  function doGlitch(){
    if(!gRunning)return;
    wrap.style.textShadow=sPx+'px 0 #ff0000,-'+sPx+'px 0 #0000ff';
    wrap.style.transform='translate('+(Math.random()*jPx*2-jPx)+'px,'+(Math.random()*jPx*2-jPx)+'px)';
    wrap.style.opacity=''+(fMin+Math.random()*(1-fMin));
    setTimeout(function(){doGlitch();},gapMin+Math.floor(Math.random()*(gapMax-gapMin)));
  }
  function stopGlitch(){gRunning=false;wrap.style.textShadow='';wrap.style.transform='';wrap.style.opacity='1';}
  function resumeGlitch(){gRunning=true;doGlitch();}
  function shake(){wrap.style.transform='translate('+(Math.random()*4-2)+'px,'+(Math.random()*4-2)+'px)';setTimeout(function(){wrap.style.transform='';},200);}
  function typewrite(el,cb){var t=el.textContent;el.textContent='';el.style.opacity='1';el.appendChild(cursor);var i=0;var iv=setInterval(function(){if(i<t.length){cursor.before(t[i]);i++;}else{clearInterval(iv);if(cursor.parentNode)cursor.remove();cb();}},30);shake();}
  function fadeIn(el,cb){el.style.transition='opacity 1.5s ease';el.style.opacity='1';setTimeout(cb,1600);}
  function processItems(idx){if(idx>=items.length){setTimeout(function(){document.body.style.transition='opacity 0.5s ease';document.body.style.opacity='0';setTimeout(function(){window.location.href='../272/index.html';},500);},1000);return;}var el=items[idx];if(el.classList.contains('s')){typewrite(el,function(){
    
    setTimeout(function(){processItems(idx+1);},400);});}else{fadeIn(el,function(){processItems(idx+1);});}}
  setTimeout(function(){doGlitch();processItems(0);},500);
})();
</script>
</body>
</html>
