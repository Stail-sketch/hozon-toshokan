<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; }
  .content p { margin-bottom: 20px; }
  .s { font-family: 'Courier New', Courier, monospace; color: #333333; font-size: 11px; line-height: 2.0; margin-bottom: 6px; }
  .s.w { color: #555522; }
  .s.e { color: #552222; }
  .s.c { color: #773333; }
  .s.f { color: #993333; }
  .frag { color: rgba(255,255,255,0.5); }
  .dim { color: rgba(255,255,255,0.25); }
  .vdim { color: rgba(255,255,255,0.1); }
  .indent { padding-left: 4em; }
  .pgnum { position: fixed; bottom: 20px; right: 30px; color: rgba(255,255,255,0.06); font-size: 13px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="pgnum">262/300</div>
<div class="wrap">
  <div class="content">

    <p>統一郎館長の日記に、こう書かれていました。</p>
    <p class="s w">[SYSTEM] ARCHIVE_STATUS : MINOR_ANOMALY</p>
    <p>「記録が残っている限り、あの人たちは『いた』ことになる。」</p>
    <p class="s w">[WARNING] SESSION_ANOMALY_DETECTED</p>
    <p class="s">[SYSTEM] CHECKING ...</p>
    <p>その通りだと思います。<br>
    記録は、存在の証明です。</p>
    <p class="s">[SYSTEM] ARCHIVE_INTEGRITY : 89%</p>

  </div>
</div>
<script>
console.log("262/300");
(function(){
  var items=document.querySelectorAll('.content p');
  var wrap=document.querySelector('.wrap');
  items.forEach(function(el){el.style.opacity='0';});
  var cursor=document.createElement('span');
  cursor.textContent='_';cursor.style.cssText='animation:blink .5s step-end infinite;font-family:Courier New,monospace';
  var st=document.createElement('style');
  st.textContent='@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}';
  document.head.appendChild(st);
  function shake(){wrap.style.transform='translate('+(Math.random()*2-1)+'px,'+(Math.random()*2-1)+'px)';setTimeout(function(){wrap.style.transform='';},100);}
  function typewrite(el,cb){var t=el.textContent;el.textContent='';el.style.opacity='1';el.appendChild(cursor);var i=0;var iv=setInterval(function(){if(i<t.length){cursor.before(t[i]);i++;}else{clearInterval(iv);if(cursor.parentNode)cursor.remove();cb();}},30);shake();}
  function fadeIn(el,cb){el.style.transition='opacity 3s ease';el.style.opacity='1';setTimeout(cb,3200);}
  function processItems(idx){if(idx>=items.length){setTimeout(function(){document.body.style.transition='opacity 0.5s ease';document.body.style.opacity='0';setTimeout(function(){window.location.href='../263/index.html';},500);},1000);return;}var el=items[idx];if(el.classList.contains('s')){typewrite(el,function(){if(false&&el.textContent.match(/INTEGRITY/)){glitchBurst();}setTimeout(function(){processItems(idx+1);},800);});}else{fadeIn(el,function(){processItems(idx+1);});}}
  var jPx=1;var sPx=1;var sOp='22';var fMin=0.85;var constant=false;
  function doGlitch(){
    wrap.style.textShadow=sPx+'px 0 #ff0000'+sOp+',-'+sPx+'px 0 #0000ff'+sOp;
    wrap.style.transform='translate('+(Math.random()*jPx*2-jPx)+'px,'+(Math.random()*jPx*2-jPx)+'px)';
    wrap.style.opacity=''+(fMin+Math.random()*(1-fMin));
    setTimeout(function(){if(!constant){wrap.style.textShadow='';wrap.style.transform='';wrap.style.opacity='1';}},67);
  }
  function glitchBurst(){for(var i=0;i<5;i++)setTimeout(doGlitch,i*33);}
  function startGlitch(){if(constant){setInterval(function(){doGlitch();},50+Math.floor(Math.random()*67));}else{setInterval(doGlitch,3333);}}
  setTimeout(function(){processItems(0);startGlitch();},500);
})();
</script>
</body>
</html>
