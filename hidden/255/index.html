<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; }
  .content p { margin-bottom: 20px; }
  .pgnum { position: fixed; bottom: 20px; right: 30px; color: rgba(255,255,255,0.08); font-size: 13px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="pgnum">255/300</div>
<div class="wrap">
  <div class="content">

    <p>いいえ。</p>
    <p>それは正確ではないかもしれません。</p>
    <p>館長の日記にはこうありました。<br>
    「文香さんなら気づく。気づいてもなお、選ぶと思っている。」</p>
    <p>使うことと、信じること。<br>
    利用することと、託すこと。<br>
    その境界は、どこにあるのでしょうか。</p>
    <p>館長は私を信頼していたのだと思います。<br>
    信頼していたから、選ぶと決めつけた。<br>
    それが一番残酷なことだったのかもしれません。</p>

  </div>
</div>
<script>
console.log("255/300");
(function(){
  var ps=document.querySelectorAll('.content p');
  ps.forEach(function(p){p.style.opacity='0';p.style.transition='opacity 2s ease';});
  ps.forEach(function(p,i){
    setTimeout(function(){p.style.opacity='1';},1600*i);
  });
  var allDone=1600*(ps.length-1)+2000;
  setTimeout(function(){
    document.body.style.transition='opacity 0.5s ease';
    document.body.style.opacity='0';
    setTimeout(function(){window.location.href='../256/index.html';},500);
  },allDone+1000);
})();
</script>
</body>
</html>
