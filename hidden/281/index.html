<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; text-align: center; }
  .content p { margin-bottom: 20px; }
  #cursor { font-family: 'Courier New', monospace; font-size: 15px; position: absolute; top: 80px; left: 44px; animation: blink 0.5s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div class="wrap">
  <div class="content" id="text-container">
    <p>澄奈市立保存図書館は閉館いたしました。</p>
    <p>長らくのご利用、ありがとうございました。</p>
    <p>&nbsp;</p>
    <p>蔵書はすべて返却処理が完了しております。</p>
    <p>本サイトは間もなく削除されます。</p>
  </div>
</div>
<span id="cursor" style="display:none;">_</span>
<script>
console.log("281/300");
(function(){
  var ps=document.querySelectorAll('.content p');
  var wrap=document.querySelector('.wrap');
  var cursorEl=document.getElementById('cursor');
  var garbageChars='\u2588\u2593\u2591\u2592\u25a0\u25aa';
  ps.forEach(function(p){p.style.opacity='0';p.style.transition='opacity 2s ease';});

  // Phase 1: Fade in paragraphs (2s intervals, slower)
  ps.forEach(function(p,i){
    setTimeout(function(){p.style.opacity='1';},i*2000);
  });

  // Glitch engine (much stronger)
  var gRunning=false;var gTimer;var gStart;
  function doGlitch(){
    if(!gRunning)return;
    var t=Math.min(1,(Date.now()-gStart)/3000);
    var s=Math.floor(t*8)+2;
    var j=Math.floor(t*6)+2;
    var minOp=0.3+0.2*(1-t);
    wrap.style.textShadow=s+'px 0 #ff0000,-'+s+'px 0 #0000ff';
    wrap.style.transform='translate('+(Math.random()*j*2-j)+'px,'+(Math.random()*j*2-j)+'px)';
    wrap.style.opacity=''+(minOp+Math.random()*(1-minOp));
    if(Math.random()<0.15){
      document.body.style.backgroundColor='#330000';
      setTimeout(function(){document.body.style.backgroundColor='#000000';},50);
    }
    gTimer=setTimeout(doGlitch,50+Math.floor(Math.random()*100));
  }
  function startGlitch(){gRunning=true;gStart=Date.now();doGlitch();}
  function stopGlitch(){gRunning=false;clearTimeout(gTimer);wrap.style.textShadow='';wrap.style.transform='';wrap.style.opacity='1';document.body.style.backgroundColor='#000000';}

  // Backspace deletion with garbage chars
  function getAllText(){
    var result=[];
    ps.forEach(function(p){
      var t=p.textContent||'';
      if(t.trim().length>0) result.push({el:p,text:t});
    });
    return result;
  }

  function startDeletion(){
    var entries=getAllText();
    var chars=[];
    entries.forEach(function(entry){
      for(var i=0;i<entry.text.length;i++){
        chars.push({el:entry.el,fullText:entry.text,charIdx:i});
      }
    });
    var idx=chars.length-1;
    var delCount=0;
    var delTimer=setInterval(function(){
      if(idx<0){
        clearInterval(delTimer);
        ps.forEach(function(p){p.textContent='';});
        stopGlitch();
        showCursor();
        return;
      }
      var c=chars[idx];
      var remaining=c.fullText.substring(0,c.charIdx);
      var g=garbageChars[Math.floor(Math.random()*garbageChars.length)];
      c.el.textContent=remaining+g;
      (function(el,text){
        setTimeout(function(){el.textContent=text;},60);
      })(c.el,remaining);
      chars.forEach(function(ch){if(ch.el===c.el)ch.fullText=remaining;});
      delCount++;
      if(delCount%5===0){
        wrap.style.textShadow='10px 0 #ff0000,-10px 0 #0000ff';
        wrap.style.transform='translate('+(Math.random()*12-6)+'px,'+(Math.random()*12-6)+'px)';
        document.body.style.backgroundColor='#440000';
        setTimeout(function(){document.body.style.backgroundColor='#000000';},30);
      }
      idx--;
    },40);
  }

  // Cursor phase (3s blink)
  function showCursor(){
    cursorEl.style.display='block';
    cursorEl.style.opacity='1';
    cursorEl.style.transition='opacity 1s ease';
    setTimeout(function(){
      cursorEl.style.opacity='0';
      setTimeout(function(){
        setTimeout(function(){
          window.location.href='../282/index.html';
        },3000);
      },1000);
    },3000);
  }

  // Timeline
  setTimeout(startGlitch,13000);
  setTimeout(startDeletion,16000);
})();
</script>
</body>
</html>
