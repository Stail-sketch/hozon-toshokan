<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; text-align: center; }
  .content p { margin-bottom: 20px; }
  #cursor { font-family: 'Courier New', monospace; font-size: 15px; position: absolute; top: 80px; left: 44px; animation: blink 0.5s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<div class="wrap">
  <div class="content" id="text-container">
    <p>澄奈市立保存図書館は閉館いたしました。</p>
    <p>長らくのご利用、ありがとうございました。</p>
    <p>&nbsp;</p>
    <p>蔵書はすべて返却処理が完了しております。</p>
    <p>本サイトは間もなく削除されます。</p>
  </div>
</div>
<span id="cursor" style="display:none;">_</span>
<script>
console.log("281/300");
(function(){
  var ps=document.querySelectorAll('.content p');
  var wrap=document.querySelector('.wrap');
  var cursorEl=document.getElementById('cursor');
  ps.forEach(function(p){p.style.opacity='0';p.style.transition='opacity 2s ease';});

  // Phase 1: Fade in (0-12s) - each line 2s apart
  ps.forEach(function(p,i){
    setTimeout(function(){p.style.opacity='1';},i*800);
  });

  // Phase 2: Static (12-15s) - just wait

  // Phase 3: Glitch starts (15-18s)
  var gRunning=false;var gTimer;
  function doGlitch(){
    if(!gRunning)return;
    var intensity=Math.min(1,(Date.now()-gStart)/1000);
    var s=Math.floor(intensity*4)+1;
    var j=Math.floor(intensity*3)+1;
    wrap.style.textShadow=s+'px 0 #ff0000,-'+s+'px 0 #0000ff';
    wrap.style.transform='translate('+(Math.random()*j*2-j)+'px,'+(Math.random()*j*2-j)+'px)';
    wrap.style.opacity=''+(0.5+Math.random()*0.5);
    gTimer=setTimeout(doGlitch,100+Math.floor(Math.random()*200));
  }
  var gStart;
  function startGlitch(){gRunning=true;gStart=Date.now();doGlitch();}
  function stopGlitch(){gRunning=false;clearTimeout(gTimer);wrap.style.textShadow='';wrap.style.transform='';wrap.style.opacity='1';}

  // Phase 4: Backspace deletion (18-35s)
  // Collect all text nodes
  function getAllText(){
    var result=[];
    ps.forEach(function(p){
      var t=p.textContent||'';
      if(t.trim().length>0) result.push({el:p,text:t});
    });
    return result;
  }

  function startDeletion(){
    var entries=getAllText();
    // Flatten to char array with references
    var chars=[];
    entries.forEach(function(entry){
      for(var i=0;i<entry.text.length;i++){
        chars.push({el:entry.el,fullText:entry.text,charIdx:i});
      }
    });
    // Delete from end
    var idx=chars.length-1;
    var delTimer=setInterval(function(){
      if(idx<0){
        clearInterval(delTimer);
        stopGlitch();
        showCursor();
        return;
      }
      var c=chars[idx];
      c.el.textContent=c.fullText.substring(0,c.charIdx);
      // Update fullText for this element
      chars.forEach(function(ch){if(ch.el===c.el)ch.fullText=c.el.textContent;});
      // Glitch burst on delete
      if(idx%10===0){
        var s=5;wrap.style.textShadow=s+'px 0 #ff0000,-'+s+'px 0 #0000ff';
        wrap.style.transform='translate('+(Math.random()*6-3)+'px,0)';
      }
      idx--;
    },20);
  }

  // Phase 5: Cursor blink (35-38s)
  function showCursor(){
    cursorEl.style.display='block';
    cursorEl.style.opacity='1';
    cursorEl.style.transition='opacity 1s ease';
    // Phase 6: cursor fadeout and redirect
    setTimeout(function(){
      cursorEl.style.opacity='0';
      setTimeout(function(){
        // 5s black screen then redirect
        setTimeout(function(){
          window.location.href='../282/index.html';
        },2000);
      },1000);
    },1000);
  }

  // Timeline
  setTimeout(startGlitch,5000);   // Phase 3
  setTimeout(startDeletion,6000);  // Phase 4
})();
</script>
</body>
</html>
