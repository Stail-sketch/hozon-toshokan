<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #000000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; }
  .content p { margin-bottom: 20px; }
  .pgnum { position: fixed; bottom: 20px; right: 30px; color: rgba(255,255,255,0.08); font-size: 13px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="pgnum">257/300</div>
<div class="wrap">
  <div class="content">

    <p>最も若い方は、17歳でした。<br>
    処理理由は「儀式目撃」。<br>
    見てしまっただけで、消されました。</p>
    <p>最も年長の方は、82歳でした。<br>
    処理理由は「相続異議申立」。<br>
    奈瀬家の遺産に異を唱えただけで、消されました。</p>
    <p>どの方にも、消されるべき理由などありませんでした。<br>
    あったのは、奈瀬家にとっての「都合」だけです。</p>

  </div>
</div>
<script>
console.log("257/300");
(function(){
  var ps=document.querySelectorAll('.content p');
  ps.forEach(function(p){p.style.opacity='0';p.style.transition='opacity 2s ease';});
  ps.forEach(function(p,i){
    setTimeout(function(){p.style.opacity='1';},2500*i);
  });
  var allDone=2500*(ps.length-1)+2000;
  setTimeout(function(){
    document.body.style.transition='opacity 0.5s ease';
    document.body.style.opacity='0';
    setTimeout(function(){window.location.href='../258/index.html';},500);
  },allDone+1000);
})();
</script>
</body>
</html>
