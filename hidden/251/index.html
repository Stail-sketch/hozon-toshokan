<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>| 澄奈市立保存図書館</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; background-color: #8B0000; color: #ffffff; font-family: '游明朝', 'Yu Mincho', 'YuMincho', 'Hiragino Mincho ProN', serif; font-size: 15px; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 80px 44px; }
  .content { line-height: 2.8; }
  .content p { margin-bottom: 20px; }
  .next-link { margin-top: 80px; text-align: center; }
  .next-link a { color: rgba(255,255,255,0.35); text-decoration: none; font-size: 13px; font-family: 'Courier New', monospace; }
  .next-link a:hover { color: rgba(255,255,255,0.6); }
  .pgnum { position: fixed; bottom: 20px; right: 30px; color: rgba(255,255,255,0.15); font-size: 13px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="pgnum">251/300</div>
<div class="wrap">
  <div class="content">

    <p>白奈 文香と申します。</p>
    <p>澄奈市立保存図書館、主任司書を務めておりました。</p>
    <p>ここまで読んでくださったのですね。</p>
    <p>少し、お話しさせてください。</p>

  </div>
  <div class="next-link"><a href="../252/index.html">[ 次の記録 ]</a></div>
</div>
<script>
console.log("251/300");
(function(){
  var ps = document.querySelectorAll('.content p');
  var nl = document.querySelector('.next-link');
  nl.style.opacity='0'; nl.style.pointerEvents='none';
  nl.style.transition='opacity 1.5s ease';
  ps.forEach(function(p){ p.style.opacity='0'; p.style.transition='opacity 1.5s ease'; });
  ps.forEach(function(p,i){
    setTimeout(function(){ p.style.opacity='1'; }, 1600*i);
  });
  setTimeout(function(){ nl.style.opacity='1'; nl.style.pointerEvents='auto'; }, 1600*ps.length+1000);
})();
</script>
</body>
</html>
